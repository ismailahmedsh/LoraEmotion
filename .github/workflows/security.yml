name: Security Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------------------------------------------------------
  # SAST — Bandit scans Python source for common security issues.
  # Results uploaded as SARIF so they appear in GitHub Security → Code Scanning.
  # -------------------------------------------------------------------------
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload SARIF to GitHub Code Scanning
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (SARIF output)
        # -r  recursive
        # -ll medium severity and above
        # -f sarif uploads to GitHub Code Scanning dashboard
        # --exit-zero so workflow continues even if issues found (SARIF upload handles reporting)
        run: |
          bandit -r . -ll \
            -x ./.venv,./venv,./data/processed \
            --exit-zero \
            -f sarif -o bandit.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

  # -------------------------------------------------------------------------
  # Secret Detection — Gitleaks scans git history and working tree for
  # accidentally committed secrets (API keys, tokens, passwords).
  # -------------------------------------------------------------------------
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Dependency Scanning — pip-audit checks all pinned dependencies against
  # the OSV (Open Source Vulnerabilities) database for known CVEs.
  # -------------------------------------------------------------------------
  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        # --desc shows the CVE description inline.
        # Exit code 1 if any vulnerabilities found — fails the check.
        run: pip-audit -r requirements.txt --desc
